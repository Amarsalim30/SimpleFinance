name: Hardening Task
description: Backup, security, resilience, and release readiness tasks
title: "[Hardening] "
labels:
  - hardening
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Reliability or security outcome.
      placeholder: Implement JSON export/import validation.
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk Addressed
      description: Which failure mode this protects against.
      placeholder: Data loss from phone reset without valid backup.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Clear pass/fail checks.
      placeholder: |-
        - Export files include schema version
        - Invalid restore files are rejected safely
        - User receives clear error message
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Test Plan
      description: Include negative-path tests.
      placeholder: Corrupt file, missing fields, and version mismatch scenarios.
    validations:
      required: true

