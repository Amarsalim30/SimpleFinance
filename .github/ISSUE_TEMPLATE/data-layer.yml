name: Data Layer Task
description: Room, DAO, migration, and repository tasks
title: "[Data] "
labels:
  - data
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: One clear outcome for this issue.
      placeholder: Implement Room entities for daily closing and inventory snapshots.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: In Scope
      description: What must be delivered.
      placeholder: Entity files, DAO contracts, and basic DB wiring.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Testable criteria.
      placeholder: |-
        - Entities compile
        - DAO tests pass
        - No destructive migration
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Test Plan
      description: Which tests prove completion.
      placeholder: Unit tests + instrumentation migration tests.
    validations:
      required: true

